<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="grid">
    <section id="nhl" class="panel">
      <header class="panel-header">
        <h2>
          <img src="nhl-logo.png" alt="" class="header-logo">
          <span id="nhl-title-text">NHL Scores</span>
        </h2>
        <div class="panel-header-right">
          <span class="updated" data-updated-for="nhl"></span>
          <span id="nhl-dots" class="rot-dots"></span>
          <span id="nhl-nav" class="rot-dots"></span>
        </div>
      </header>
      <div class="panel-body" data-body="nhl">
        <div class="view view-nhl-today active">Loading…</div>
        <div class="view view-nhl-yesterday">Loading…</div>
      </div>
    </section>

    <section id="weather" class="panel">
      <header class="panel-header">
        <h2 id="weather-title">
          <span id="weather-title-text">Weather</span>
          <span id="weather-label"></span>
        </h2>
        <div class="panel-header-right">
          <span class="updated" data-updated-for="weather"></span>
          <span id="weather-dots" class="rot-dots"></span>
          <span id="weather-nav" class="rot-dots"></span>
        </div>
      </header>
      <div class="panel-body" data-body="weather">
        <div class="view view-weather active">Loading…</div>
        <div class="view view-calendar">Loading…</div>
        <div class="view view-clock">
          <div class="clock-time"></div>
          <div class="clock-date"></div>
        </div>
        <div class="view view-countdown">
          <div class="countdown-number"></div>
          <div class="countdown-label"></div>
        </div>
      </div>
    </section>

    <section id="rss" class="panel panel-wide">
      <header class="panel-header">
        <h2 id="rss-title">RSS</h2>
        <div class="panel-header-right">
          <span class="updated" data-updated-for="rss"></span>
          <span id="rss-dots" class="rot-dots"></span>
          <span id="rss-nav" class="rot-dots"></span>
        </div>
      </header>
      <div class="panel-body" data-body="rss">Loading…</div>
    </section>
  </main>

  <button id="debug-dot" aria-label="Show debug info"></button>
  <div id="debug-backdrop"></div>
  <aside id="debug-sheet" aria-hidden="true">
    <header>
      <span>Debug</span>
      <button id="debug-close" aria-label="Close">✕</button>
    </header>
    <div id="update-banner" class="update-banner"></div>
    <div id="debug-body">Loading…</div>
  </aside>

  <div id="game-backdrop"></div>
  <aside id="game-sheet" aria-hidden="true" aria-labelledby="game-sheet-title" role="dialog" aria-modal="true" tabindex="-1">
    <header>
      <span id="game-sheet-title">Game details</span>
      <button id="game-close" aria-label="Close">Close</button>
    </header>
    <div id="game-body">Loading…</div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
